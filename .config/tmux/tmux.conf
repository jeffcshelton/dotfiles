# Use alt + B as prefix instead of ctrl + B.
set-option -g prefix M-b
unbind C-b
bind M-b send-prefix

# Use backslash and shift + backslash for splitting panes.
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-| split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Bind reload command.
bind -n M-r source-file ~/.config/tmux/tmux.conf

# Bind arrow keys to pane switching.
bind -n M-Down select-pane -D
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U

# Bind shift + arrow keys to pane resizing.
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5

# Bind window creation and navigation combinations.
bind -n M-w new-window
bind -n M-q kill-window
bind -n M-[ previous-window
bind -n M-] next-window

# Open an AI agent in a side pane after pressing Alt + A, then C/X/G.
set -g @ai_agent_side_width "40%"
bind -n M-a switch-client -T ai-agents \; display-message "AI agent: C=Claude X=Codex G=Gemini Esc=cancel"
bind -T ai-agents c run-shell "~/.config/tmux/scripts/open-ai-agent.sh claude" \; switch-client -T root
bind -T ai-agents C run-shell "~/.config/tmux/scripts/open-ai-agent.sh claude" \; switch-client -T root
bind -T ai-agents x run-shell "~/.config/tmux/scripts/open-ai-agent.sh codex" \; switch-client -T root
bind -T ai-agents X run-shell "~/.config/tmux/scripts/open-ai-agent.sh codex" \; switch-client -T root
bind -T ai-agents g run-shell "~/.config/tmux/scripts/open-ai-agent.sh gemini" \; switch-client -T root
bind -T ai-agents G run-shell "~/.config/tmux/scripts/open-ai-agent.sh gemini" \; switch-client -T root
bind -T ai-agents Escape switch-client -T root \; display-message "AI agent launch cancelled"
bind -T ai-agents Any switch-client -T root \; display-message "Unknown AI agent key"

# Configure for use with Neovim.
set -g focus-events on
set -g visual-activity off
set -gq allow-passthrough on

# Enable mouse usage.
set -g mouse on

# Set Rose Pine theme variant.
set -g @rose_pine_variant "moon"

# Declare all plugins.
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "rose-pine/tmux"

# Initialize the Tmux Plugin Manager
run "~/.config/tmux/plugins/tpm/tpm"
